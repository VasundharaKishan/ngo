name: Frontend CI

on:
  pull_request:
    paths:
      - 'foundation-frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: foundation-frontend/package-lock.json

      - name: Install dependencies
        working-directory: foundation-frontend
        run: npm ci

      - name: Type check
        working-directory: foundation-frontend
        run: npx tsc -b

      - name: Run tests with coverage
        working-directory: foundation-frontend
        run: npm run test:coverage
