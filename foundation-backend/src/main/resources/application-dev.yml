# Development profile overrides
# Activate with: --spring.profiles.active=dev or SPRING_PROFILES_ACTIVE=dev

app:
  jwt:
    secret: dev-only-secret-do-not-use-in-production-minimum-32-bytes
    cookie-secure: false  # Allow HTTP cookies in local development
  auth:
    otp-enabled: false  # Skip OTP in local development

springdoc:
  swagger-ui:
    enabled: true  # Enable Swagger UI in dev only

logging:
  level:
    com.myfoundation.school: DEBUG
    com.myfoundation.school.security: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.cors: DEBUG
    org.hibernate.SQL: DEBUG
