spring:
  application:
    name: foundation-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ngo_donations?sslmode=prefer}
    username: ${DATABASE_USERNAME:e141057}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver  
  
  flyway:
    enabled: true
    baseline-on-migrate: true   # treats existing schema as already at baseline version
    baseline-version: 14        # V1–V14 are already applied; Flyway tracks from V15 onward
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: never
      data-locations: classpath:sample-data.sql
      continue-on-error: false
  
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
  
  mail:
    host: ${MAIL_HOST:example.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:example_username}
    password: ${BREVO_SMTP_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from-name: ${MAIL_FROM_NAME:Yugal Savitri Seva}
    reply-to: ${MAIL_REPLY_TO:yugalsavitriseva@gmail.com}
    from:
      account-alerts: ${MAIL_FROM_ACCOUNT_ALERTS:account-alerts@yugalsavitriseva.org}
      donations: ${MAIL_FROM_DONATIONS:donations@yugalsavitriseva.org}
      support: ${MAIL_FROM_SUPPORT:support@yugalsavitriseva.org}
      contact: ${MAIL_FROM_CONTACT:contact@yugalsavitriseva.org}
      system: ${MAIL_FROM_SYSTEM:noreply@yugalsavitriseva.org}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-long-random-value-please}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
    # Cookie-based JWT for secure authentication
    cookie-enabled: ${JWT_COOKIE_ENABLED:true}
    cookie-name: ${JWT_COOKIE_NAME:admin_jwt}
    cookie-domain: ${JWT_COOKIE_DOMAIN:}
    cookie-secure: ${JWT_COOKIE_SECURE:true}
  allow-admin-bootstrap: ${ALLOW_ADMIN_BOOTSTRAP:true}
  auth:
    otp-enabled: ${AUTH_OTP_ENABLED:false}
    otp-expiration-minutes: ${AUTH_OTP_EXPIRATION_MINUTES:5}
    otp-max-attempts: ${AUTH_OTP_MAX_ATTEMPTS:5}
    otp-length: ${AUTH_OTP_LENGTH:6}
  rate-limit:
    # Window duration — all limits below are "requests per this many seconds"
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:1}
    # Per-group caps for RateLimitingFilter (token bucket) — requests per window-seconds
    login: ${APP_RATE_LIMIT_LOGIN:5}
    admin: ${APP_RATE_LIMIT_ADMIN:100}
    general: ${APP_RATE_LIMIT_GENERAL:100}
    # Login brute-force uses its own longer window for stronger protection
    auth-login-window-seconds: ${RATE_LIMIT_AUTH_LOGIN_WINDOW:60}
    # Per-endpoint caps for RateLimitingInterceptor (sliding window) — requests per window-seconds
    endpoint-auth-login: ${RATE_LIMIT_ENDPOINT_AUTH_LOGIN:7}
    endpoint-donation-create: ${RATE_LIMIT_ENDPOINT_DONATION_CREATE:20}
    endpoint-webhook: ${RATE_LIMIT_ENDPOINT_WEBHOOK:120}
    endpoint-campaigns: ${RATE_LIMIT_ENDPOINT_CAMPAIGNS:100}
    endpoint-categories: ${RATE_LIMIT_ENDPOINT_CATEGORIES:50}
    endpoint-cms: ${RATE_LIMIT_ENDPOINT_CMS:50}
    endpoint-config: ${RATE_LIMIT_ENDPOINT_CONFIG:50}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,https://www.yugalsavitriseva.org,https://frontend-three-psi-17.vercel.app,https://foundation-frontend-three.vercel.app}

storage:
  r2:
    endpoint: ${R2_ENDPOINT:https://example.r2.cloudflarestorage.com}
    bucket: ${R2_BUCKET:ngo-images}
    access-key: ${R2_ACCESS_KEY:dummy}
    secret-key: ${R2_SECRET_KEY:dummy}
    public-base-url: ${R2_PUBLIC_BASE_URL:}


stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_your_key_here}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret_here}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:5173/donate/success?session_id={CHECKOUT_SESSION_ID}}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:5173/donate/cancel}


springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

logging:
  level:
    com.myfoundation.school: INFO
    com.myfoundation.school.security: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.cors: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web.servlet.resource: WARN

data:
  init:
    enabled: true
